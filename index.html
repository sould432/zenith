<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>인터넷 업무 칠판</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Pretendard", sans-serif;
    }

    body {
        overflow: hidden;
        background: #1e1e1e;
    }

    #toolbar {
        position: fixed;
        top: 15px;
        left: 15px;
        z-index: 9999;
    }

    #addBtn {
        padding: 12px 18px;
        border: none;
        border-radius: 10px;
        background: #ffd54f;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    #board {
        width: 100vw;
        height: 100vh;
        position: relative;
    }

    .note {
        width: 240px;
        min-height: 180px;
        position: absolute;
        background: #fff59d;
        border-radius: 12px;
        padding: 14px;
        box-shadow: 0 6px 18px rgba(0,0,0,0.3);
        cursor: grab;
        user-select: none;
        transition: 0.2s;
    }

    .note.completed {
        opacity: 0.45;
    }

    .note.completed .content {
        text-decoration: line-through;
    }

    .content {
        font-size: 16px;
        white-space: pre-wrap;
        word-break: break-word;
        margin-bottom: 12px;
    }

    .alarm {
        font-size: 12px;
        color: #555;
    }

    .context-menu {
        position: fixed;
        background: white;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        z-index: 10000;
        display: none;
    }

    .context-menu button {
        width: 140px;
        padding: 12px;
        border: none;
        background: white;
        cursor: pointer;
        text-align: left;
    }

    .context-menu button:hover {
        background: #f0f0f0;
    }

    .modal {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 20000;
    }

    .modal-content {
        background: white;
        padding: 24px;
        border-radius: 16px;
        width: 350px;
    }

    .modal-content h2 {
        margin-bottom: 16px;
    }

    textarea,
    input {
        width: 100%;
        margin-bottom: 12px;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    .modal-buttons {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
    }

    .modal-buttons button {
        padding: 10px 14px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }

    .save-btn {
        background: #4caf50;
        color: white;
    }

    .cancel-btn {
        background: #ccc;
    }
</style>
</head>

<body>

<div id="toolbar">
    <button id="addBtn">+ 업무 추가</button>
</div>

<div id="board"></div>

<div class="context-menu" id="contextMenu">
    <button id="editBtn">수정</button>
    <button id="completeBtn">완료 / 취소</button>
    <button id="deleteBtn">삭제</button>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <h2>업무 작성</h2>

        <textarea id="taskInput" rows="5" placeholder="업무 내용을 입력하세요"></textarea>

        <label>알람 시간</label>
        <input type="datetime-local" id="alarmInput" />

        <div class="modal-buttons">
            <button class="cancel-btn" id="cancelModal">취소</button>
            <button class="save-btn" id="saveModal">저장</button>
        </div>
    </div>
</div>

<script>
const board = document.getElementById("board");
const addBtn = document.getElementById("addBtn");

const modal = document.getElementById("modal");
const taskInput = document.getElementById("taskInput");
const alarmInput = document.getElementById("alarmInput");

const saveModal = document.getElementById("saveModal");
const cancelModal = document.getElementById("cancelModal");

const contextMenu = document.getElementById("contextMenu");
const editBtn = document.getElementById("editBtn");
const deleteBtn = document.getElementById("deleteBtn");
const completeBtn = document.getElementById("completeBtn");

let notes = JSON.parse(localStorage.getItem("notes") || "[]");

let selectedNoteId = null;
let editMode = false;

function saveNotes() {
    localStorage.setItem("notes", JSON.stringify(notes));
}

function renderNotes() {
    board.innerHTML = "";

    notes.forEach(note => {
        const div = document.createElement("div");
        div.className = "note";

        if (note.completed) {
            div.classList.add("completed");
        }

        div.style.left = note.x + "px";
        div.style.top = note.y + "px";

        div.innerHTML = `
            <div class="content">${note.text}</div>
            <div class="alarm">
                ${
                    note.alarm
                    ? "⏰ " + new Date(note.alarm).toLocaleString()
                    : "알람 없음"
                }
            </div>
        `;

        enableDrag(div, note);

        div.addEventListener("contextmenu", e => {
            e.preventDefault();

            selectedNoteId = note.id;

            contextMenu.style.display = "block";
            contextMenu.style.left = e.clientX + "px";
            contextMenu.style.top = e.clientY + "px";
        });

        board.appendChild(div);
    });
}

function createNote(text, alarm) {
    notes.push({
        id: Date.now(),
        text,
        alarm,
        x: 200,
        y: 120,
        completed: false
    });

    saveNotes();
    renderNotes();
}

function enableDrag(element, note) {
    let offsetX = 0;
    let offsetY = 0;
    let dragging = false;

    element.addEventListener("mousedown", e => {
        if (e.button !== 0) return;

        dragging = true;

        offsetX = e.clientX - note.x;
        offsetY = e.clientY - note.y;

        element.style.cursor = "grabbing";
    });

    window.addEventListener("mousemove", e => {
        if (!dragging) return;

        note.x = e.clientX - offsetX;
        note.y = e.clientY - offsetY;

        element.style.left = note.x + "px";
        element.style.top = note.y + "px";
    });

    window.addEventListener("mouseup", () => {
        if (dragging) {
            dragging = false;
            element.style.cursor = "grab";
            saveNotes();
        }
    });
}

addBtn.addEventListener("click", () => {
    editMode = false;

    taskInput.value = "";
    alarmInput.value = "";

    modal.style.display = "flex";
});

saveModal.addEventListener("click", () => {
    const text = taskInput.value.trim();
    const alarm = alarmInput.value;

    if (!text) {
        alert("업무 내용을 입력하세요.");
        return;
    }

    if (editMode) {
        const note = notes.find(n => n.id === selectedNoteId);

        note.text = text;
        note.alarm = alarm;

    } else {
        createNote(text, alarm);
    }

    saveNotes();
    renderNotes();

    modal.style.display = "none";
});

cancelModal.addEventListener("click", () => {
    modal.style.display = "none";
});

window.addEventListener("click", () => {
    contextMenu.style.display = "none";
});

editBtn.addEventListener("click", () => {
    const note = notes.find(n => n.id === selectedNoteId);

    if (!note) return;

    editMode = true;

    taskInput.value = note.text;
    alarmInput.value = note.alarm || "";

    modal.style.display = "flex";
});

deleteBtn.addEventListener("click", () => {
    notes = notes.filter(n => n.id !== selectedNoteId);

    saveNotes();
    renderNotes();
});

completeBtn.addEventListener("click", () => {
    const note = notes.find(n => n.id === selectedNoteId);

    if (!note) return;

    note.completed = !note.completed;

    saveNotes();
    renderNotes();
});

function checkAlarms() {
    const now = new Date().getTime();

    notes.forEach(note => {
        if (!note.alarm || note.completed) return;

        const alarmTime = new Date(note.alarm).getTime();

        if (
            now >= alarmTime &&
            !note.notified
        ) {
            note.notified = true;

            alert("⏰ 업무 알림\n\n" + note.text);

            if (Notification.permission === "granted") {
                new Notification("업무 리마인드", {
                    body: note.text
                });
            }

            saveNotes();
        }
    });
}

if ("Notification" in window) {
    Notification.requestPermission();
}

setInterval(checkAlarms, 1000);

renderNotes();
</script>

</body>
</html>
